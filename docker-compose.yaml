services:
  db:
    image: postgres:16-alpine
    container_name: tts_db
    env_file:
      - django/.env.dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  django:
    build:
      context: ./django
      target: dev
    container_name: tts_django
    env_file:
      - django/.env.dev
    entrypoint: ["/usr/src/django/entrypoint.dev.sh"]
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ./django/:/usr/src/django/
      - ./scripts/marketplace/mock_data.sql:/mock-data.sql:ro
    ports:
      - "8100:8000"
    depends_on:
      db:
        condition: service_healthy
      redis_service:
        condition: service_started

  frontend:
    build:
      context: ../tts-fe
      target: dev
    container_name: tts_frontend
    env_file:
      - ../tts-fe/.env.dev
    volumes:
      - ../tts-fe:/usr/src/tts-fe
      - /usr/src/tts-fe/node_modules
    ports:
      - "3100:3100"
    depends_on:
      - django

  fetcher:
    build: ./fetcher
    container_name: tts_fetcher
    volumes:
      - ./fetcher/:/fetcher/

  redis_service:
    image: redis:6.2-bullseye
    container_name: tts_redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: tts-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:

networks:
  default:
    name: tts-docker-network
